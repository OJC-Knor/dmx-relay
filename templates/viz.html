<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>soos-lights — viz</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #050507;
    --card: #16161a;
    --line: #2a2a30;
    --text: #f4f4f6;
    --muted: #8a8a94;
    --accent: #6c8eff;
  }
  * { box-sizing: border-box; }
  html, body { background: var(--bg); }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    margin: 0; padding: 16px; color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px; gap: 12px;
  }
  h1 { margin: 0; font-size: 18px; font-weight: 700; }
  .links a {
    color: var(--muted); text-decoration: none; font-size: 12px;
    margin-left: 14px;
  }
  .links a:hover { color: var(--text); }
  .running {
    font-size: 12px; color: var(--accent);
    font-variant: small-caps; letter-spacing: 1px;
  }
  .running.idle { color: var(--muted); }

  #stage {
    position: relative; width: 100%; aspect-ratio: 16 / 10;
    background:
      radial-gradient(ellipse at 50% 14%,
        rgba(108,142,255,0.06) 0%,
        rgba(108,142,255,0)   30%),
      radial-gradient(ellipse at 50% 90%,
        rgba(255,80,80,0.04) 0%,
        rgba(255,80,80,0)    25%),
      var(--bg);
    border: 1px solid var(--line); border-radius: 12px;
    overflow: hidden;
  }
  .zone-label {
    position: absolute; left: 50%;
    transform: translateX(-50%);
    font-size: 9px; letter-spacing: 3px;
    color: rgba(255,255,255,0.18);
    pointer-events: none;
  }
  .zone-label.crowd { top: 6px; }
  .zone-label.stage { bottom: 6px; }

  .fx {
    position: absolute;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    pointer-events: none;
    transition: background-color 60ms linear, box-shadow 80ms linear,
                opacity 100ms linear;
  }
  .fx.tripar { width: 28px; height: 28px; }
  .fx.head   { width: 22px; height: 22px;
               border: 1.5px solid rgba(255,255,255,0.25); }
  .fx.atomic { width: 32px; height: 32px;
               border: 2px solid rgba(255,255,255,0.18); }
  .fx.fog {
    width: 90px; height: 90px;
    background: radial-gradient(circle, rgba(180,200,220,0.5), rgba(180,200,220,0));
    filter: blur(8px); opacity: 0;
  }

  .fx-label {
    position: absolute;
    transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.45);
    font-size: 9px;
    pointer-events: none;
    text-shadow: 0 1px 2px rgba(0,0,0,0.8);
  }

  .beam {
    position: absolute;
    transform-origin: 50% 0%;
    width: 2px;
    background: linear-gradient(180deg, currentColor 0%, transparent 100%);
    border-radius: 2px;
    pointer-events: none;
    transition: opacity 80ms linear, transform 120ms linear,
                background 80ms linear;
  }
</style>
</head>
<body>
  <header>
    <div>
      <h1>Live viz</h1>
      <div class="running idle" id="running">— idle —</div>
    </div>
    <div class="links">
      <a href="/">Controls</a>
      <a href="/editor">Layout</a>
    </div>
  </header>

  <div id="stage">
    <div class="zone-label crowd">CROWD</div>
    <div class="zone-label stage">STAGE</div>
  </div>

<script>
const $ = (id) => document.getElementById(id);
const stage = $('stage');

let positions = {};
let fixtures = [];
let elements = {};   // id -> {body, beam?, label}

// ----- color helpers -----

const FOCUS_COLORS = {  // FocusSpotTwo
  white:        [255, 255, 255],
  red:          [255, 60, 60],
  blue:         [70, 120, 255],
  green:        [60, 230, 100],
  yellow:       [255, 230, 60],
  pink:         [255, 130, 200],
  light_blue:   [160, 200, 255],
  light_green:  [180, 255, 170],
  light_yellow: [255, 255, 200],
};
const FOCUS_BANDS = [
  [0, 14, 'white'], [15, 29, 'red'], [30, 44, 'blue'], [45, 59, 'green'],
  [60, 74, 'yellow'], [75, 89, 'pink'], [90, 104, 'light_blue'],
  [105, 119, 'light_green'], [120, 127, 'light_yellow'],
];

const GROOT_COLORS = {  // MSZoom 250
  open: [255, 255, 255], white: [255, 255, 255],
  blue: [70, 120, 255], red: [255, 60, 60],
  green: [60, 230, 100], yellow: [255, 230, 60],
  magenta: [255, 80, 220], cyan: [120, 230, 255],
  light_green: [180, 255, 170],
};
const GROOT_BANDS = [
  [0, 15, 'white'], [16, 31, 'blue'], [32, 47, 'red'], [48, 63, 'green'],
  [64, 79, 'yellow'], [80, 95, 'magenta'], [96, 111, 'cyan'],
  [112, 127, 'light_green'],
];

function bandLookup(value, bands) {
  for (const [lo, hi, name] of bands) if (value >= lo && value <= hi) return name;
  return null;
}

function rgb(r, g, b) { return `rgb(${r|0}, ${g|0}, ${b|0})`; }
function dimRGB([r, g, b], k) { return rgb(r * k, g * k, b * k); }

// ----- rendering -----

function makeFixtureElements() {
  // remove anything we created previously
  for (const els of Object.values(elements)) {
    Object.values(els).forEach(e => e.remove());
  }
  elements = {};

  for (const f of fixtures) {
    const pos = positions[f.id] || { x: 0.5, y: 0.5 };
    const body = document.createElement('div');
    body.className = `fx ${f.type === 'focus' || f.type === 'groot' ? 'head' : f.type}`;
    body.style.left = (pos.x * 100) + '%';
    body.style.top = (pos.y * 100) + '%';
    stage.appendChild(body);

    const els = { body };

    // moving heads get a beam line
    if (f.type === 'focus' || f.type === 'groot') {
      const beam = document.createElement('div');
      beam.className = 'beam';
      beam.style.left = (pos.x * 100) + '%';
      beam.style.top = (pos.y * 100) + '%';
      stage.appendChild(beam);
      els.beam = beam;
    }

    elements[f.id] = els;
  }
}

function updateTripar(id, t) {
  const el = elements[id]?.body;
  if (!el) return;
  // RGBW — model real fixture: dimmer scales, white adds desaturated white
  const dim = t.dimmer / 255;
  // strobe quirk: this firmware needs strobe>0 to emit
  const lit = t.strobe > 0 ? 1 : 0;
  const w = t.white;
  const r = Math.min(255, t.red + w * 0.7);
  const g = Math.min(255, t.green + w * 0.7);
  const b = Math.min(255, t.blue + w * 0.7);
  const k = dim * lit;
  el.style.background = rgb(r * k, g * k, b * k);
  // glow when lit
  const intensity = (r + g + b) / 3 * k;
  if (intensity > 30) {
    el.style.boxShadow =
      `0 0 ${10 + intensity / 8}px ${rgb(r * k, g * k, b * k)},
       0 0 ${20 + intensity / 4}px ${rgb(r * k * .6, g * k * .6, b * k * .6)}`;
  } else {
    el.style.boxShadow = 'none';
  }
}

function updateHead(id, h, kind) {
  const els = elements[id];
  if (!els) return;
  const { body, beam } = els;

  const bands = kind === 'focus' ? FOCUS_BANDS : GROOT_BANDS;
  const palette = kind === 'focus' ? FOCUS_COLORS : GROOT_COLORS;
  const colorName = bandLookup(h.color, bands) || 'white';
  const colorRGB = palette[colorName] || [255, 255, 255];

  const shutterOpen = h.shutter >= 8;  // 0..7 closed, ≥8 open or strobe
  const k = (h.dimmer / 255) * (shutterOpen ? 1 : 0);

  body.style.background = dimRGB(colorRGB, k);
  body.style.boxShadow = k > 0.05
    ? `0 0 ${8 + k * 18}px ${dimRGB(colorRGB, k)}`
    : 'none';

  // beam: angle from pan, length from tilt (low tilt = pointing horizontal, high = down)
  if (beam) {
    const panDeg = ((h.pan - 128) / 128) * 60;   // ±60° around neutral
    const tilt01 = h.tilt / 255;
    const length = 30 + tilt01 * 80;
    beam.style.color = dimRGB(colorRGB, Math.max(0.2, k));
    beam.style.opacity = k * 0.85;
    beam.style.height = length + 'px';
    beam.style.transform = `translate(-50%, 0) rotate(${panDeg}deg)`;
  }
}

function updateAtomic(a) {
  const el = elements['atomic']?.body;
  if (!el) return;
  const k = (a.intensity || 0) / 255;
  el.style.background = `rgb(${255 * k}, ${255 * k}, ${230 * k})`;
  el.style.boxShadow = k > 0.05
    ? `0 0 ${20 + k * 30}px rgba(255, 255, 220, ${k}),
       0 0 ${40 + k * 60}px rgba(255, 240, 180, ${k * 0.6})`
    : 'none';
}

function updateFog(level) {
  const el = elements['fog']?.body;
  if (!el) return;
  el.style.opacity = (level / 255) * 0.9;
}

async function tick() {
  try {
    const r = await fetch('/api/state');
    const s = await r.json();

    const run = $('running');
    if (s.running_scene) {
      run.textContent = `▶  ${s.running_scene}`;
      run.classList.remove('idle');
    } else {
      run.textContent = '— idle —';
      run.classList.add('idle');
    }

    for (const t of s.tripars) updateTripar(t.id, t);
    for (const h of s.focus)   updateHead(h.id, h, 'focus');
    for (const h of s.groot)   updateHead(h.id, h, 'groot');
    if (s.atomic) updateAtomic(s.atomic);
    updateFog(s.fog || 0);
  } catch (e) {
    /* ignore transient errors during reload */
  }
}

async function init() {
  const [rigRes, layoutRes] = await Promise.all([
    fetch('/api/rig').then(r => r.json()),
    fetch('/api/layout').then(r => r.json()),
  ]);
  fixtures = rigRes.fixtures;
  positions = layoutRes;
  makeFixtureElements();
  setInterval(tick, 50);  // 20 Hz polling
  tick();
}

init();
</script>
</body>
</html>
