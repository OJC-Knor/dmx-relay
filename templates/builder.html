<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>soos-lights — pattern builder</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0a0a0c;
    --card: #16161a;
    --card-2: #1f1f25;
    --line: #2a2a30;
    --text: #f4f4f6;
    --muted: #8a8a94;
    --accent: #6c8eff;
    --danger: #ff4d6a;
  }
  * { box-sizing: border-box; }
  html, body { background: var(--bg); }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    margin: 0; padding: 16px; color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 14px; gap: 12px; flex-wrap: wrap;
  }
  h1 { margin: 0; font-size: 20px; font-weight: 700; }
  .links a {
    color: var(--muted); text-decoration: none; font-size: 12px;
    margin-left: 14px;
  }
  .links a:hover { color: var(--text); }

  .toolbar {
    display: flex; flex-wrap: wrap; align-items: center; gap: 14px;
    background: var(--card); padding: 12px 14px;
    border: 1px solid var(--line); border-radius: 12px;
    margin-bottom: 14px;
  }
  .toolbar > div { display: flex; gap: 6px; align-items: center; }
  .toolbar label { font-size: 11px; color: var(--muted); text-transform: uppercase;
                   letter-spacing: 1px; }

  input[type=text], input[type=number] {
    background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px;
    padding: 7px 10px; font-size: 13px;
    font-family: inherit;
  }
  input[type=text] { width: 180px; }
  input[type=number] { width: 70px; }
  input[type=range] { flex: 1; min-width: 100px; }

  button {
    background: var(--card-2); color: var(--text);
    border: 1px solid var(--line); padding: 8px 14px;
    border-radius: 8px; font-size: 13px; font-weight: 500;
    cursor: pointer;
  }
  button:hover { background: #2a2a32; }
  button.primary { background: var(--accent); color: #000; border-color: var(--accent); }
  button.danger  { background: #5a1f1f; border-color: #7a2828; color: #ffb8c4; }

  .palette { display: flex; gap: 4px; flex-wrap: wrap; }
  .swatch {
    width: 32px; height: 32px; border-radius: 6px;
    border: 1.5px solid var(--line); cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .swatch.selected { border-color: var(--text); transform: scale(1.08); }
  .swatch.off {
    background:
      linear-gradient(135deg, transparent 47%, var(--danger) 47%, var(--danger) 53%, transparent 53%),
      var(--card);
  }

  .grid-wrap { overflow-x: auto; }
  table.grid {
    border-collapse: separate; border-spacing: 3px;
    background: var(--card); padding: 10px;
    border: 1px solid var(--line); border-radius: 12px;
  }
  table.grid td {
    padding: 0;
  }
  td.label {
    color: var(--muted); font-size: 11px; padding: 0 8px 0 4px;
    text-align: right; white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  td.step-label {
    color: var(--muted); font-size: 10px; text-align: center;
    padding-bottom: 2px;
    font-variant-numeric: tabular-nums;
  }
  .cell {
    width: 28px; height: 28px;
    background: var(--card-2);
    border: 1px solid var(--line);
    border-radius: 4px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  .cell.beat { border-left: 1px solid var(--accent); }
  .cell.playing { box-shadow: inset 0 0 0 2px var(--accent); }

  .status {
    margin-top: 12px; font-size: 12px; color: var(--muted);
  }
  .toast {
    position: fixed; left: 50%; top: 16px; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--line);
    padding: 8px 14px; border-radius: 8px; font-size: 13px;
    opacity: 0; pointer-events: none; transition: opacity .2s;
    z-index: 100;
  }
  .toast.show { opacity: 1; }
  .toast.error { border-color: var(--danger); color: #ffb8c4; }
</style>
</head>
<body>
  <header>
    <h1>Pattern builder</h1>
    <div class="links">
      <a href="/">Controls</a>
      <a href="/viz">Viz</a>
      <a href="/editor">Layout</a>
    </div>
  </header>

  <div class="toolbar">
    <div>
      <label>Name</label>
      <input type="text" id="name" placeholder="my pattern">
    </div>
    <div>
      <label>Steps</label>
      <input type="number" id="steps" min="2" max="64" value="16">
    </div>
    <div>
      <label>BPM</label>
      <input type="number" id="bpm" min="40" max="240" value="120">
      <span style="font-size:11px;color:var(--muted)" id="bpmInfo">125ms/step</span>
    </div>
    <div>
      <label>Saved</label>
      <select id="loadSel" style="background:var(--bg);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:13px">
        <option value="">— pick —</option>
      </select>
      <button onclick="loadSelected()">Load</button>
    </div>
    <div style="margin-left:auto;display:flex;gap:6px">
      <button onclick="clearAll()">Clear</button>
      <button onclick="save()">Save</button>
      <button class="primary" id="playBtn" onclick="togglePlay()">▶ Play</button>
    </div>
  </div>

  <div class="toolbar">
    <div><label>Brush</label></div>
    <div class="palette" id="palette"></div>
  </div>

  <div class="grid-wrap">
    <table class="grid" id="grid"></table>
  </div>

  <div class="status" id="status">Tap or drag cells to paint with the selected brush. Tap with the OFF brush to clear.</div>

  <div class="toast" id="toast"></div>

<script>
const $ = (id) => document.getElementById(id);

const PALETTE = [
  { name: 'off',     rgb: null,                cls: 'off' },
  { name: 'red',     rgb: [255, 30, 30] },
  { name: 'orange',  rgb: [255, 130, 0] },
  { name: 'yellow',  rgb: [255, 230, 30] },
  { name: 'green',   rgb: [30, 230, 80] },
  { name: 'cyan',    rgb: [30, 220, 255] },
  { name: 'blue',    rgb: [50, 100, 255] },
  { name: 'purple',  rgb: [180, 50, 255] },
  { name: 'pink',    rgb: [255, 80, 200] },
  { name: 'white',   rgb: [255, 255, 255] },
];

const TRIPAR_COUNT = 12;
let steps = 16;
let bpm = 120;
let brush = 1;            // index into PALETTE
let playing = false;
let playCol = -1;
let playTimer = null;

// pattern state — maps tripar-N -> array of [r,g,b]|null
let pattern = {};

function stepMs() {
  // 16ths at the given BPM:  60_000 / (bpm * 4)
  return Math.round(60000 / (bpm * 4));
}

function showToast(msg, kind) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show' + (kind === 'error' ? ' error' : '');
  clearTimeout(showToast._h);
  showToast._h = setTimeout(() => t.className = 'toast', 1600);
}

function blankPattern() {
  const out = {};
  for (let i = 0; i < TRIPAR_COUNT; i++) {
    out[`tripar-${i + 1}`] = Array.from({ length: steps }, () => null);
  }
  return out;
}

function ensureShape() {
  // make sure every track has exactly `steps` cells
  for (let i = 0; i < TRIPAR_COUNT; i++) {
    const id = `tripar-${i + 1}`;
    const arr = pattern[id] || [];
    if (arr.length < steps) arr.push(...Array.from({ length: steps - arr.length }, () => null));
    if (arr.length > steps) arr.length = steps;
    pattern[id] = arr;
  }
}

// ----- palette UI -----

function buildPalette() {
  const wrap = $('palette');
  wrap.innerHTML = '';
  PALETTE.forEach((c, i) => {
    const sw = document.createElement('div');
    sw.className = 'swatch' + (c.cls ? ' ' + c.cls : '') + (i === brush ? ' selected' : '');
    if (c.rgb) sw.style.background = `rgb(${c.rgb.join(',')})`;
    sw.title = c.name;
    sw.onclick = () => { brush = i; buildPalette(); };
    wrap.appendChild(sw);
  });
}

// ----- grid UI -----

function buildGrid() {
  ensureShape();
  const grid = $('grid');
  grid.innerHTML = '';

  // header row of step numbers
  const head = document.createElement('tr');
  head.appendChild(document.createElement('td'));    // corner
  for (let s = 0; s < steps; s++) {
    const td = document.createElement('td');
    td.className = 'step-label';
    if (s % 4 === 0) td.textContent = (s + 1);
    head.appendChild(td);
  }
  grid.appendChild(head);

  // one row per Tripar
  for (let i = 0; i < TRIPAR_COUNT; i++) {
    const id = `tripar-${i + 1}`;
    const row = document.createElement('tr');
    const lbl = document.createElement('td');
    lbl.className = 'label';
    lbl.textContent = `T${i + 1}`;
    row.appendChild(lbl);
    for (let s = 0; s < steps; s++) {
      const td = document.createElement('td');
      const cell = document.createElement('div');
      cell.className = 'cell' + (s % 4 === 0 ? ' beat' : '');
      cell.dataset.tripar = id;
      cell.dataset.step = s;
      paintCell(cell, pattern[id][s]);
      attachCell(cell);
      td.appendChild(cell);
      row.appendChild(td);
    }
    grid.appendChild(row);
  }
}

function paintCell(el, rgb) {
  if (rgb) {
    el.style.background = `rgb(${rgb.join(',')})`;
  } else {
    el.style.background = '';
  }
}

let dragging = false;
function attachCell(el) {
  el.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    el.setPointerCapture(e.pointerId);
    dragging = true;
    apply(el);
  });
  el.addEventListener('pointerenter', () => {
    if (dragging) apply(el);
  });
  const end = () => dragging = false;
  el.addEventListener('pointerup', end);
  el.addEventListener('pointercancel', end);
}

function apply(el) {
  const id = el.dataset.tripar;
  const s = +el.dataset.step;
  const c = PALETTE[brush];
  pattern[id][s] = c.rgb ? [...c.rgb] : null;
  paintCell(el, pattern[id][s]);
}

// ----- play indicator -----

function highlightCol(col) {
  document.querySelectorAll('.cell.playing').forEach(c => c.classList.remove('playing'));
  if (col >= 0) {
    document.querySelectorAll(`.cell[data-step="${col}"]`).forEach(c => c.classList.add('playing'));
  }
}

function startLocalPlayhead() {
  stopLocalPlayhead();
  playCol = 0;
  highlightCol(playCol);
  playTimer = setInterval(() => {
    playCol = (playCol + 1) % steps;
    highlightCol(playCol);
  }, stepMs());
}

function stopLocalPlayhead() {
  if (playTimer) { clearInterval(playTimer); playTimer = null; }
  highlightCol(-1);
}

// ----- save / load / play -----

function packPattern() {
  // tracks values must be plain RGB arrays; null cells become [0,0,0]
  const tracks = {};
  for (const [id, cells] of Object.entries(pattern)) {
    tracks[id] = cells.map(c => c ?? [0, 0, 0]);
  }
  return { step_ms: stepMs(), bpm, steps, tracks };
}

async function save() {
  const name = ($('name').value || '').trim();
  if (!name) { showToast('Name the pattern first', 'error'); return; }
  const r = await fetch(`/api/patterns/${encodeURIComponent(name)}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(packPattern()),
  });
  if (r.ok) { showToast('Saved'); refreshSavedList(); }
  else showToast('Save failed', 'error');
}

async function refreshSavedList() {
  const r = await fetch('/api/patterns');
  const data = await r.json();
  const sel = $('loadSel');
  const current = sel.value;
  sel.innerHTML = '<option value="">— pick —</option>';
  for (const name of Object.keys(data.patterns).sort()) {
    const opt = document.createElement('option');
    opt.value = name; opt.textContent = name;
    sel.appendChild(opt);
  }
  if (current) sel.value = current;
}

async function loadSelected() {
  const name = $('loadSel').value;
  if (!name) return;
  const r = await fetch('/api/patterns');
  const data = await r.json();
  const p = data.patterns[name];
  if (!p) { showToast('Not found', 'error'); return; }
  $('name').value = name;
  steps = p.steps || 16; $('steps').value = steps;
  bpm = p.bpm || 120;    $('bpm').value = bpm;
  // unpack: convert any [0,0,0] in the data back to null *only if* user wants
  // off cells — we keep them as [0,0,0] to round-trip faithfully
  pattern = {};
  for (let i = 0; i < TRIPAR_COUNT; i++) {
    const id = `tripar-${i + 1}`;
    const arr = (p.tracks[id] || []).slice(0, steps);
    pattern[id] = arr.map(c => (c[0] || c[1] || c[2]) ? c : null);
    while (pattern[id].length < steps) pattern[id].push(null);
  }
  buildGrid();
  updateBpmInfo();
  showToast(`Loaded ${name}`);
}

function clearAll() {
  if (!confirm('Clear the whole pattern?')) return;
  pattern = blankPattern();
  buildGrid();
}

async function togglePlay() {
  if (playing) {
    await fetch('/scene/stop', { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}' });
    playing = false;
    $('playBtn').textContent = '▶ Play';
    stopLocalPlayhead();
    return;
  }
  // save first under a transient name if blank
  const name = ($('name').value || '').trim() || '__live';
  $('name').value = name;
  await fetch(`/api/patterns/${encodeURIComponent(name)}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(packPattern()),
  });
  const r = await fetch(`/api/patterns/${encodeURIComponent(name)}/play`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: '{}',
  });
  if (r.ok) {
    playing = true;
    $('playBtn').textContent = '■ Stop';
    startLocalPlayhead();
  } else {
    showToast('Play failed', 'error');
  }
}

function updateBpmInfo() {
  $('bpmInfo').textContent = `${stepMs()}ms/step`;
}

// ----- wire up -----

$('steps').addEventListener('change', () => {
  steps = Math.max(2, Math.min(64, +$('steps').value || 16));
  buildGrid();
});
$('bpm').addEventListener('change', () => {
  bpm = Math.max(40, Math.min(240, +$('bpm').value || 120));
  updateBpmInfo();
  if (playing) {
    // restart the local playhead with the new tempo
    stopLocalPlayhead();
    startLocalPlayhead();
  }
});
window.addEventListener('pointerup',     () => dragging = false);
window.addEventListener('pointercancel', () => dragging = false);

// init
pattern = blankPattern();
buildPalette();
buildGrid();
updateBpmInfo();
refreshSavedList();
</script>
</body>
</html>
